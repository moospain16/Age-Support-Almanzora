/* FLOATING ACCESSIBILITY BAR */

.accessibility-bar{
position:fixed;
top:0;
left:0;
width:100%;
background:black;
color:white;
text-align:center;
padding:8px;
z-index:1000;
}

.accessibility-bar button{
margin:0 6px;
padding:6px 12px;
font-size:16px;
cursor:pointer;
}

/* LANGUAGE FLAGS */

.lang-toggle{

left:10px;

}

.lang-toggle button{
display:block;
background:none;
border:none;
padding:0;

}

/* HERO */

color:white;
padding:60px 20px;
text-align:center;
}

/* READ ALOUD CONTROLS */

margin:30px 0;
}

.read-controls button{

padding:12px 20px;
margin:10px;
cursor:pointer;
border-radius:8px;
border:none;
background:#003366;
color:white;
}

.read-controls button:hover{
background:#0055aa;
}

/* CONTENT */

.content{
max-width:900px;
margin:auto;
padding:40px 20px;
}

/* FOOTER */

footer{
background:#f2f2f2;
padding:30px;
text-align:center;
}

.charity-info{
font-size:0.85em;
color:#666;
margin-top:20px;
}

.site-credit{

color:#777;
padding:15px;

/* CALL BUTTON */

.call-button{
position:fixed;
bottom:20px;
right:20px;
background:#28a745;
color:white;
font-size:22px;
padding:16px 22px;
border-radius:50px;
text-decoration:none;
}

</style>

<script>

/* ==============================
   FONT SIZE SYSTEM
============================== */

let fontSize = localStorage.getItem("siteFontSize");

if(!fontSize){
fontSize = 20;
}else{
fontSize = parseInt(fontSize);
}

function applyFont(){
document.body.style.fontSize = fontSize + "px";
localStorage.setItem("siteFontSize", fontSize);
}

function increaseText(){
fontSize += 4;
if(fontSize > 36){fontSize = 36;}
applyFont();
}

function decreaseText(){
fontSize -= 4;
if(fontSize < 18){fontSize = 18;}
applyFont();
}

function resetText(){
fontSize = 20;
applyFont();
}

/* ==============================
   LANGUAGE SYSTEM
============================== */

let lang = localStorage.getItem("siteLang") || "en";

function setLang(selected){
lang = selected;
localStorage.setItem("siteLang", lang);
loadLanguage();
}

function loadLanguage(){

let elements = document.querySelectorAll("[data-en]");

elements.forEach(function(el){

let text = el.getAttribute("data-" + lang);

if(text){
el.innerText = text;
}

});

}

/* ==============================
   READ ALOUD SYSTEM
============================== */

let speech;

function readPage(){

stopReading();

let content = document.querySelector(".content");

if(!content) return;

let text = content.innerText;

speech = new SpeechSynthesisUtterance(text);

let lang = localStorage.getItem("siteLang") || "en";

if(lang === "es"){
speech.lang = "es-ES";
}else{
speech.lang = "en-GB";
}

speech.rate = 0.95;
speech.pitch = 1;

speechSynthesis.speak(speech);

}

function stopReading(){
speechSynthesis.cancel();
}

/* ==============================
   INITIAL PAGE LOAD
============================== */

document.addEventListener("DOMContentLoaded",function(){

applyFont();
loadLanguage();

});

</script>
