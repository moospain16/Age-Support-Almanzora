/* FLOATING ACCESSIBILITY BAR */

.accessibility-bar{
position:fixed;
top:0;
left:0;
width:auto;

color:white;
text-align:left;
padding:3px 8px;

}

.accessibility-bar button{

}

/* LANGUAGE FLAGS */

.lang-toggle{

top:4px;
right:10px;
z-index:1100;
}

.lang-toggle button{
display:block;
background:none;
border:none;
padding:0;
cursor:pointer;
}

.flag{

height:auto;

}

/* HEADER */

flex-wrap:wrap;
}

nav a{
text-decoration:none;
color:#003366;

}

/* HERO */

color:white;
padding:60px 20px;
text-align:center;
}

/* READ ALOUD CONTROLS */

}

.read-controls button{

padding:12px 20px;
margin:10px;

color:white;
}

.read-controls button:hover{

}

/* CONTENT */

.content{

margin:auto;
padding:40px 20px;
}

/* FOOTER */

footer{
background:#f2f2f2;
padding:30px;
text-align:center;
}

.charity-info{
font-size:0.85em;
color:#666;
margin-top:20px;
}

.site-credit{
text-align:center;
font-size:12px;
color:#777;
padding:15px;
}

/* CALL BUTTON */

.call-button{
position:fixed;
bottom:20px;
right:20px;
background:#28a745;
color:white;
font-size:22px;
padding:16px 22px;
border-radius:50px;
text-decoration:none;
}

</style>

<script>

/* ==============================
   FONT SIZE SYSTEM
============================== */

let fontSize = localStorage.getItem("siteFontSize");

if(!fontSize){
fontSize = 20;
}else{
fontSize = parseInt(fontSize);
}

function applyFont(){
document.body.style.fontSize = fontSize + "px";
localStorage.setItem("siteFontSize", fontSize);
}

function increaseText(){
fontSize += 4;
if(fontSize > 36){fontSize = 36;}
applyFont();
}

function decreaseText(){
fontSize -= 4;
if(fontSize < 18){fontSize = 18;}
applyFont();
}

function resetText(){
fontSize = 20;
applyFont();
}

/* ==============================
   LANGUAGE SYSTEM
============================== */

let lang = localStorage.getItem("siteLang") || "en";

function toggleLang(){
lang = (lang === "en") ? "es" : "en";
localStorage.setItem("siteLang", lang);
loadLanguage();
updateLangFlag();
}

function updateLangFlag(){
/* Show the flag of the OTHER language (the one you'd switch TO) */
let img = document.getElementById("langFlagImg");
if(!img) return;
if(lang === "en"){
img.src = "flag_spain.webp";
img.alt = "Español";
}else{
img.src = "flag_uk.webp";
img.alt = "English";
}
}

function loadLanguage(){

let elements = document.querySelectorAll("[data-en]");

elements.forEach(function(el){

let text = el.getAttribute("data-" + lang);

if(text){
el.innerText = text;
}

});

}

/* ==============================
   READ ALOUD SYSTEM
============================== */

let speech;
let isReading = false;
let cachedFemaleVoiceEN = null;
let cachedFemaleVoiceES = null;
let voicesReady = false;

const femaleKeywords = [
"Female","female","Zira","Susan","Sarah","Libby","Aria",
"Samantha","Victoria","Karen","Moira","Fiona","Tessa",
"Alice","Allison","Ava","Catherine","Emily","Emma",
"Google UK English Female","Google US English Female",
"Helena","Julie","Laura","Lucia","Maria","Monica",
"Paulina","Princess","Rosa","Sandy","Shelley","Siri",
"Veena","Vicki","Yelena","Yuna"
];

function pickFemaleVoice(voices, langCode){
let voice = voices.find(v =>
v.lang === langCode &&
femaleKeywords.some(k => v.name.includes(k))
);
if(!voice){
voice = voices.find(v =>
v.lang.startsWith(langCode.substring(0,2)) &&
femaleKeywords.some(k => v.name.includes(k))
);
}
if(!voice){
voice = voices.find(v =>
femaleKeywords.some(k => v.name.includes(k))
);
}
return voice || null;
}

function cacheVoices(){
let voices = speechSynthesis.getVoices();
if(voices.length === 0) return;
cachedFemaleVoiceEN = pickFemaleVoice(voices, "en-GB");
cachedFemaleVoiceES = pickFemaleVoice(voices, "es-ES");
voicesReady = true;
}

/* Trigger voice loading as early as possible */
speechSynthesis.getVoices();
speechSynthesis.addEventListener("voiceschanged", cacheVoices);

function updateReadButton(){
let btn = document.getElementById("readBtn");
if(!btn) return;
if(isReading){
btn.innerHTML = "⏹ Stop";
}else{
btn.innerHTML = "🔊 Listen";
}
}

function toggleReading(){
if(isReading){
stopReading();
}else{
readPage();
}
}

function readPage(){

speechSynthesis.cancel();

let content = document.querySelector(".content");
if(!content) return;

let text = content.innerText;
speech = new SpeechSynthesisUtterance(text);

let siteLang = localStorage.getItem("siteLang") || "en";

if(siteLang === "es"){
speech.lang = "es-ES";
}else{
speech.lang = "en-GB";
}

speech.rate = 0.95;
speech.pitch = 1;

speech.onstart = function(){
isReading = true;
updateReadButton();
};

speech.onend = function(){
isReading = false;
updateReadButton();
};

speech.onerror = function(){
isReading = false;
updateReadButton();
};

function speakWithVoice(){
cacheVoices();
let femaleVoice = (speech.lang === "es-ES") ? cachedFemaleVoiceES : cachedFemaleVoiceEN;
if(femaleVoice){ speech.voice = femaleVoice; }
speechSynthesis.speak(speech);
}

if(voicesReady){
speakWithVoice();
}else{
speechSynthesis.addEventListener("voiceschanged", function onReady(){
speechSynthesis.removeEventListener("voiceschanged", onReady);
speakWithVoice();
}, {once: true});
speechSynthesis.getVoices();
}

}

function stopReading(){
speechSynthesis.cancel();
isReading = false;
updateReadButton();
}

/* ==============================
   INITIAL PAGE LOAD
============================== */

document.addEventListener("DOMContentLoaded",function(){

applyFont();
loadLanguage();
updateLangFlag();

});

</script>
